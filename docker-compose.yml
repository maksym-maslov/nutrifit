services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  main-api:
    build: ./services/main-api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nutrifit
      APP_COOKIE_SECURE: "false"
      ML_API_BASE_URL: http://ml-api:8000
    depends_on:
      postgres:
        condition: service_healthy
      ml-api:
        condition: service_started

  ml-api:
    build: ./services/ml-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/nutrifit
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - main-api

volumes:
  postgres_data:
