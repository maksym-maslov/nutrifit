services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  main-api:
    build: ./services/main-api
    env_file: .env
    volumes:
      - ./certs/jwt:/run/secrets/jwt:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      ML_API_BASE_URL: http://ml-api:8000
      RSA_PUBLIC_KEY: file:/run/secrets/jwt/public.pem
      RSA_PRIVATE_KEY: file:/run/secrets/jwt/private.pem
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  ml-api:
    build: ./services/ml-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      main-api:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs/tls:/etc/nginx/certs:ro
    depends_on:
      - main-api

volumes:
  postgres_data:
